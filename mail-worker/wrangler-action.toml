name = "${NAME}"
main = "src/index.js"
compatibility_date = "2025-06-04"
compatibility_flags = ["nodejs_als"]
keep_vars = true
workers_dev = true
preview_urls = true

[observability]
enabled = true

[[routes]]
pattern = "${CUSTOM_DOMAIN}"
custom_domain = true

[[d1_databases]]
binding = "db"
database_name = "${D1_DATABASE_NAME}"
database_id = "${D1_DATABASE_ID}"

[[kv_namespaces]]
binding = "kv"
id = "${KV_NAMESPACE_ID}"

[[r2_buckets]]
binding = "r2"
bucket_name = "${R2_BUCKET_NAME}"

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/attachments/*", "/static/*"]

[triggers]
crons = ["*/30 * * * *", "0 16 * * *"]


[vars]
ai_model = "${AI_MODEL}"
analysis_cache = "${ANALYSIS_CACHE}"
#orm_log = false
domain = "${DOMAIN}"
admin = "${ADMIN}"
project_link = "${PROJECT_LINK}"

linuxdo_client_id = "${LINUXDO_CLIENT_ID}"
linuxdo_callback_url = "${LINUXDO_CALLBACK_URL}"
linuxdo_switch = "${LINUXDO_SWITCH}"
cors_origins = "${CORS_ORIGINS}"
resend_webhook_allow_unsigned = "${RESEND_WEBHOOK_ALLOW_UNSIGNED}"

[build]
command = "node ../scripts/cloudflare-workers-git-build.mjs"
